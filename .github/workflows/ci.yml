name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/*
      - release/*
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Core Verification & Deployment
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run Static Analysis (Linting)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.test
          target: lint
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare Test Environment (Docker)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.test
          target: test
          load: true
          tags: whisper-pro-asr-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Orchestrate Test Suite (Integration)
        run: |
          mkdir -p assets
          docker run --rm \
            -e SKIP_LINT=1 \
            -v $PWD/assets:/app/assets \
            -v $PWD:/reports \
            whisper-pro-asr-test /bin/bash -c "tests/run_suite.sh && \
              cp coverage.xml /reports/coverage.xml && \
              cp coverage_output.txt /reports/coverage_output.txt && \
              cp pytest.xml /reports/pytest.xml"

      - name: Export Coverage to Job Summary
        run: |
          echo "### Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          # Extract the summary table part from pytest-cov output
          sed -n '/---------- coverage/,/TOTAL/p' coverage_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Generate PR Coverage Comment
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          pytest-coverage-path: ./coverage_output.txt
          junitxml-path: ./pytest.xml

      - name: Resolve Docker Metadata & Tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ventura8/whisper-pro-asr
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Authenticate to DockerHub
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/heads/release/') ||
          startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Finalize & Push Production Image
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/heads/release/') ||
          startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
