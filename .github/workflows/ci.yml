name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/*
      - release/*
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build & Verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run Linting (Isolated)
        run: |
          docker run --rm -v $PWD:/app -w /app python:3.11-slim /bin/bash -c " \
            pip install --no-cache-dir pylint yamllint && \
            yamllint -c .yamllint . && \
            python -m pylint modules tests whisper_pro_asr.py --recursive=y --disable=import-error"

      - name: Build Test Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.test
          load: true
          tags: whisper-pro-asr-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Execute Test Suite
        run: |
          mkdir -p assets
          docker run --rm \
            -e SKIP_LINT=1 \
            -v $PWD/assets:/app/assets \
            -v $PWD:/reports \
            whisper-pro-asr-test /bin/bash -c "tests/run_suite.sh && \
              cp coverage.xml /reports/coverage.xml && \
              cp coverage_output.txt /reports/coverage_output.txt && \
              cp pytest.xml /reports/pytest.xml"

      - name: Publish Coverage to Summary
        run: |
          echo "### Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          # Extract the summary table part from pytest-cov output
          sed -n '/---------- coverage/,/TOTAL/p' coverage_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Pytest Coverage Comment
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          pytest-coverage-path: ./coverage_output.txt
          junitxml-path: ./pytest.xml

      - name: Build and Push Production Image
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ventura8/whisper-pro-asr:latest
            ventura8/whisper-pro-asr:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ventura8/whisper-pro-asr

      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
