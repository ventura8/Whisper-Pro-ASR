---
services:
  whisper-pro-asr:
    build:
      context: .
      dockerfile: Dockerfile
      # Persist BuildKit cache across docker compose builds (especially useful on Windows/WSL2).
      cache_from:
        - type=local,src=.buildx-cache
      cache_to:
        - type=local,dest=.buildx-cache,mode=max
    container_name: whisper-pro-asr
    restart: unless-stopped
    # Optional: run container as host user/group.
    # Ensure bind mounts (./data, ./model_cache) are writable by USER_ID:GROUP_ID before startup.
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "9000:9000"

    # --- [HARDWARE ACCELERATION] ---
    # The application performs automated detection of both Intel and NVIDIA hardware.
    # To enable hardware passthrough, uncomment the appropriate sections below.

    deploy:
      resources:
        limits:
          cpus: '4.0'

    # 1. Intel NPU / iGPU / Arc
    # Linux Intel hosts:
    # group_add:
    #   - "991"  
    # Intel render/accel group on Linux hosts
    # devices:
    #   - /dev/dri:/dev/dri  # Map all Intel GPU render nodes (multi-GPU safe)
    #   - /dev/accel:/dev/accel  # Map all Intel NPU accel nodes (multi-NPU safe)
    # Windows 11 / WSL2 Intel hosts:
    # devices:
    #   - /dev/dxg:/dev/dxg  # WSL GPU bridge required for Intel/NVIDIA GPU visibility
    #   - /dev/dri:/dev/dri  # Optional when WSL exposes DRM render nodes
    #   - /dev/accel:/dev/accel  # Optional when WSL exposes Intel NPU accel nodes

    # 2. NVIDIA Silicon (CUDA)
    # Note: Requires NVIDIA Container Toolkit on the HOST for driver passthrough.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    # 3. AMD Radeon Silicon (ROCm / DirectML)
    # Linux & Windows 11 / WSL2 AMD hosts:
    # devices:
    # - /dev/kfd:/dev/kfd # AMD ROCm Kernel Fusion Driver node (Linux bare-metal only, not WSL2)
    # - /dev/dri:/dev/dri # AMD GPU Direct Rendering Manager render nodes
    # - /dev/dxg:/dev/dxg  # Windows 11 / WSL2 AMD GPU bridge (replaces /dev/kfd via librocdxg)

    environment:
      # Optional: host timezone and identity mapping overrides (set in .env or shell environment).
      - TZ=${TZ:-UTC}
      - USER_ID=${USER_ID:-1000}
      - GROUP_ID=${GROUP_ID:-1000}
      - DEBUG=false
      # NVIDIA runtime hints (safe on non-NVIDIA hosts; used when NVIDIA toolkit is present).
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      # Intel/OpenVINO runtime hints. Leave blank unless the host runtime needs explicit overrides.
      - LIBVA_DRIVER_NAME=${LIBVA_DRIVER_NAME:-}
      - ONEAPI_DEVICE_SELECTOR=${ONEAPI_DEVICE_SELECTOR:-}
      - ZE_AFFINITY_MASK=${ZE_AFFINITY_MASK:-}
      - OCL_ICD_VENDORS=${OCL_ICD_VENDORS:-}
      # AMD ROCm / WSL2 runtime hints.
      - HSA_ENABLE_DXG_DETECTION=1
      # Speaker diarization token (Hugging Face).
      - DIARIZATION_HF_TOKEN=${DIARIZATION_HF_TOKEN:-}

      # --- [ENGINE CONFIGURATION] ---
      # Hardware Target: AMD (ROCm / DirectML / MIGraphX)
      - ASR_DEVICE=AUTO
      # Computation Precision: AUTO, int8, float16 (default: AUTO)
      - ASR_COMPUTE_TYPE=AUTO
      # Model Weight Source (Faster-Whisper ID or local path)
      - ASR_MODEL=Systran/faster-whisper-large-v3
      # ASR engine backend. Supported: AUTO, FASTER-WHISPER, INTEL-WHISPER, OPENAI-WHISPER, WHISPERX
      # AUTO resolves by available hardware in this order:
      # CUDA -> Intel GPU -> Intel NPU -> CPU
      # INTEL-WHISPER requires Intel GPU/NPU; otherwise runtime falls back to FASTER-WHISPER.
      # Invalid values fail startup with a clear error.
      - ASR_ENGINE=FASTER-WHISPER
      # Intel Whisper long-media stability tuning (only used by INTEL-WHISPER)
      - INTEL_ASR_CHUNK_DURATION=300

      # --- [SUBTITLE PROMO CARD] ---
      # Enable a promo subtitle card "Made with Whisper Pro ASR" for the first 3 seconds of SRT/VTT.
      - SUBTITLE_PROMO_ENABLED=true
      - SUBTITLE_PROMO_TEXT=Made with Whisper Pro ASR
      - SUBTITLE_PROMO_DURATION=3.0

      # --- [INFERENCE PARAMETERS] ---
      # Generation Search Breadth (Higher = more accurate, lower = faster)
      - ASR_BEAM_SIZE=5
      # Parallel segment batching (1 is recommended for single-GPU/NPU stability)
      - ASR_BATCH_SIZE=1

      # --- [PREPROCESSING (UVR / MDX-NET)] ---
      # NOTE: ASR_PREPROCESS_DEVICE controls UVR preprocessing only.
      # It is independent from ASR_ENGINE selection for Whisper inference.
      # Target Device: AUTO, CPU, CUDA (NVIDIA), AMD (ROCm), GPU (Intel), NPU (Intel)
      - ASR_PREPROCESS_DEVICE=AUTO
      # Isolation Model Filename
      - VOCAL_SEPARATION_MODEL=UVR-MDX-NET-Inst_HQ_3.onnx
      # Vocal Separation Logic Toggles
      - ENABLE_VOCAL_SEPARATION=true
      - ENABLE_LD_PREPROCESSING=true
      # Coalesce identical concurrent /detect-language requests (same local_path).
      # Keep enabled for production stability; set false to disable coalescing for test scenarios.
      - ENABLE_LD_REQUEST_COALESCING=true
      - SMART_SAMPLING_SEARCH=false

      # --- [RESOURCE ALLOCATION] ---
      # Global core limit for the entire service (Default: 4)
      - CPU_CORE_LIMIT=4
      # Core limit per Whisper ASR task (Auto-capped by CPU_CORE_LIMIT)
      - ASR_THREADS=4
      # Core limit per Preprocessing task (Auto-capped by CPU_CORE_LIMIT)
      - ASR_PREPROCESS_THREADS=4
      # Core limit for Media Normalization (0 = auto-detect system-wide)
      - FFMPEG_THREADS=4
      # Aggressive RAM/VRAM offloading (Default: false)
      - AGGRESSIVE_OFFLOAD=false
      # Idle timeout before unloading models (Default: 300 seconds)
      - MODEL_IDLE_TIMEOUT=300
      # --- [ACCELERATOR ORCHESTRATION] ---
      # Control how many physical hardware units are utilized. 
      # Default: 1 (Safest for multi-service environments). Set to 'ALL' to use everything.
      # - MAX_CUDA_UNITS=1
      # - MAX_GPU_UNITS=1
      # - MAX_NPU_UNITS=1
      # - MAX_AMD_UNITS=1
      # - MAX_CPU_UNITS=1

      # --- [MEDIA PROCESSING] ---
      # Hardware Acceleration: none (CPU), cuda (NVIDIA), vaapi, qsv (Intel)
      - FFMPEG_HWACCEL=none
      # Normalization: dynaudnorm (Standard), loudnorm (Broadcast Quality)
      - FFMPEG_FILTER=dynaudnorm

      # --- [SSD WRITE PROTECTION] ---
      # Redirect all transient processing files (uploads, FFmpeg output,
      # UVR stems) to RAM-backed storage. Eliminates SSD write wear.
      - WHISPER_TEMP_DIR=/tmp/whisper
      # Ensure numba/librosa JIT cache is writable for non-root runtime user.
      - NUMBA_CACHE_DIR=/tmp/numba-cache
      # Minimum free space (MB) in TEMP_DIR before falling back to disk.
      # Default: 2048 MB.  The service also applies a 1.5× headroom
      # multiplier on top of the estimated WAV size.  For very long
      # movies (15h+) the estimated WAV alone exceeds 2 GB, so the
      # service will automatically fall back to persistent (SSD) storage
      # — no ENOSPC crash will occur.
      # - WHISPER_TEMP_MIN_FREE_MB=2048

      # RAM-backed temp storage for transient processing files (SSD protection).
      # 2G is sufficient for most movies (≤4h).  Longer files automatically
      # fall back to SSD-backed persistent storage when tmpfs runs low.
    tmpfs:
      - /tmp/whisper:size=2G
      - /tmp/numba-cache:size=128M

    volumes:
      # Persistent cache for AI models and pre-compiled hardware binaries (NPU)
      - ./model_cache:/app/model_cache
      # Persistent storage for task history, telemetry, and system logs
      - ./data:/app/data
      # Windows 11 / WSL2 GPU host driver bridge (ROCm / CUDA / DirectX / librocdxg)
      - /usr/lib/wsl:/usr/lib/wsl
      # Recommended: Mirror your Bazarr media mappings here for instant (0-copy) local processing
      # If paths match, Whisper Pro reads files directly instead of requiring uploads.
      # - /mnt/nas/media:/media
      # - /tv:/tv
      # - /movies:/movies
